spring:
  datasource:
    url: ${SUPABASE_DB_URL}
    username: ${SUPABASE_DB_USER}
    password: ${SUPABASE_DB_PASSWORD}
    hikari:
      maximum-pool-size: 5   # Supabase 풀러 사용 — 보수적으로 설정
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.format_sql: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  port: 8080

# 시세 소스: sim | kis
market:
  provider: ${MARKET_PROVIDER:sim}
