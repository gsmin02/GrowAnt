services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend

  backend:
    build: ./backend
    env_file:
      - path: .env
        required: false   # 없으면 기본값으로 기동(.env.example 참고)
    environment:
      SPRING_PROFILES_ACTIVE: dev
      # 컨테이너 내부에서는 서비스명으로 접속(.env의 localhost 값을 덮어씀)
      DB_URL: jdbc:postgresql://postgres:5432/growant
    expose:
      - "8080"
    depends_on:
      - postgres
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # 자체 호스팅 PostgreSQL — 데이터는 도커 볼륨(postgres-data)에 영속
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: growant
      POSTGRES_USER: ${DB_USER:-growant}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-growant}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
